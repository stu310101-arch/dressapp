<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>換裝遊戲</title>
    <link rel="stylesheet" href="./styles.css" />
    <script src="./review-data.js" defer></script>
    <script src="./app.js" defer></script>
    <meta property="og:image" content="https://screenshot.cosine.page?url=https://m2qvm3i510gt.cosine.page" />
    <script src="https://cosine.sh/preview/script.js"></script>
  </head>
  <body>
    <header class="app-header">
      <div class="app-header__left">
        <h1 class="app-title">換裝遊戲</h1>
        <p class="app-subtitle">替模特兒挑選上衣、下身、鞋子、襪子與配件，完成一套完整造型。</p>
      </div>
      <div class="app-header__right">
        <div id="status" class="status" role="status" aria-live="polite"></div>
      </div>
    </header>

    <main class="app">
      <section class="model-pane" aria-label="模特兒預覽">
        <div class="model-toolbar">
          <div class="model-actions" aria-label="操作按鈕">
            <button id="clearAllBtn" class="text-button" type="button">一鍵脫下</button>
            <button id="randomWearBtn" class="text-button" type="button">隨機穿上</button>
            <button id="submitLookBtn" class="submit-look-button" type="button">送出</button>
          </div>
        </div>

        <div id="modelStage" class="model-stage">
          <div class="model-view" data-view="front" aria-label="正面">
            <div class="model-frame">
              <div class="model-placeholder" data-kind="base" aria-hidden="true">
                <div class="model-placeholder__silhouette"></div>
                <div class="model-placeholder__text">尚未放入模特兒底圖</div>
              </div>
              <img class="model-base" alt="模特兒正面" />
              <div class="model-overlays" aria-hidden="true"></div>
            </div>
          </div>
        </div>
      </section>

      <aside class="wardrobe-pane" aria-label="衣櫃">
        <div class="wardrobe-header">
          <div class="wardrobe-header__left">
            <div class="section-title">衣櫃</div>
            <div id="categoryFilters" class="category-filters" role="tablist" aria-label="切換分類"></div>
          </div>
          <div id="equippedChips" class="equipped-chips" aria-label="目前穿搭"></div>
        </div>

        <div id="wardrobeItems" class="wardrobe-shelves" aria-label="服裝列表"></div>
      </aside>
    </main>

    <div id="reviewModal" class="review-modal" hidden>
      <div id="reviewModalBackdrop" class="review-modal__backdrop"></div>
      <div class="review-modal__dialog" role="dialog" aria-modal="true" aria-labelledby="reviewTitle">
        <button id="closeReviewBtn" class="review-modal__close" type="button" aria-label="關閉">×</button>
        <div id="reviewCard" class="review-card is-empty" aria-live="polite">
          <div class="review-card__placeholder">搭配完成後按下送出，就會顯示這套穿搭的評語。</div>
          <div class="review-card__result" hidden>
            <div class="review-card__topline">
              <div>
                <div id="reviewTitle" class="review-card__title"></div>
                <div id="reviewScore" class="review-card__score"></div>
              </div>
            </div>
            <p id="reviewSummary" class="review-card__summary"></p>
            <p id="reviewDetails" class="review-card__details"></p>
          </div>
        </div>
      </div>
    </div>

    <script
      defer
      src="https://static.cloudflareinsights.com/beacon.min.js/v67327c56f0bb4ef8b305cae61679db8f1769101564043"
      integrity="sha512-rdcWY47ByXd76cbCFzznIcEaCN71jqkWBBqlwhF1SY7KubdLKZiEGeP7AyieKZlGP9hbY/MhGrwXzJC/HulNyg=="
      data-cf-beacon='{"version":"2024.11.0","token":"ad0c2b25e44a4e4aa387cdb33572cae5","r":1,"server_timing":{"name":{"cfCacheStatus":true,"cfEdge":true,"cfExtPri":true,"cfL4":true,"cfOrigin":true,"cfSpeedBrain":true},"location_startswith":null}}'
      crossorigin="anonymous"
    ></script>
  </body>
</html>
